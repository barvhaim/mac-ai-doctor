name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ matrix.python }}'}
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: mypy src
      - run: pytest --cov=mac_ai_doctor
      - run: python -m build